name: ohnost
description: A new Flutter project.

# Prevent accidental publishing to pub.dev.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.18.2 <3.0.0'

dependencies:
  fluro: ^2.0.4
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_markdown: ^0.6.13
  google_fonts: ^3.0.1
  heroicons_flutter: ^0.2.3
  html: ^0.15.1
  http: ^0.13.5
  jiffy: ^5.0.0
  markdown: ^6.0.1
  phosphor_flutter: any

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0


flutter:
  fonts:
    - family: Roboto Serif
      fonts:
        - asset: "fonts/RobotoSerif.ttf"
        - asset: "fonts/RobotoSerif-Italic.ttf"
          style: italic

  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/
